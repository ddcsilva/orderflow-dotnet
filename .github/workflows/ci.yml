name: CI - Build & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  SOLUTION: backend/OrderFlow.slnx

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: backend/global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj', 'backend/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Run unit & component tests
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --no-build --configuration ${{ env.CONFIGURATION }} \
            --filter "FullyQualifiedName!~IntegrationTests" \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Run integration tests (Testcontainers)
        run: |
          dotnet test backend/tests/OrderFlow.IntegrationTests/OrderFlow.IntegrationTests.csproj \
            --no-build --configuration ${{ env.CONFIGURATION }} \
            --logger "trx;LogFileName=integration-results.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults
        env:
          TESTCONTAINERS_RYUK_DISABLED: false
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: dotnet tests
          path: 'TestResults/**/*.trx'
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload coverage
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore

  lint-bicep:
    name: Lint Bicep
    runs-on: ubuntu-latest
    if: hashFiles('infra/azure/main.bicep') != ''
    steps:
      - uses: actions/checkout@v5

      - name: Bicep build (lint + compile)
        run: |
          az bicep build --file infra/azure/main.bicep
